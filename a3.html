            }else{

        }
        
        function test() {
            
            document.getElementById("result1").style.display="none";
            document.getElementById("result2").style.display="none";
            var x =  Math.floor(Math.random() * 13); // 0 ~ 12
            var x1, y1, y2; 
            
            if (x==sam) {
               if(x==0){
                   x=x+1;
               } else {
                  x=x-1;
               } 
            } 
           
            if (x==0) {
                x1="乾甲丁"
                y1="木   쌍산오행"
                y2="쌍산배합"
            } else if (x==1){
                x1="丁未 坤申 庚酉"
                y1="木   사국오행"
                y2="수구기준 사국결정"
            } else if (x==2){
                x1="乾坤艮巽"
                y1="木   성수오행"
                y2="좌와 사격의 길흉관계"  
            } else if (x==3){
                x1="艮丙辛"
                y1="火   쌍산오행"
                y2="쌍산배합"
            } else if (x==4){
                x1="辛戌 乾亥 壬子"
                y1="火  사국오행"
                y2="수구기준 사국결정"
            } else if (x==5){
                x1="甲庚丙壬 子午卯酉"
                y1="火 성수오행"
                y2="좌와 사격의 길흉관계"

                x1="巽庚癸"
                y1="金   쌍산오행"
                y2="쌍산배합"
            } else if (x==7){
                x1="癸丑 艮寅 甲卯"
                y1="金   사국오행"
                y2="수구기준 사국결정"
            } else if (x==8){
                x1="辰戌丑未"
                y1="金   성수오행"
                y2="좌와 사격의 길흉관계"
            } else if (x==9){
                x1="坤壬乙 (곤임을)"  
                y1="水    쌍산오행"
                y2="쌍산배합"
            } else if (x==10){
                x1="乙辰 巽巳 丙午"  
                y1="水    사국오행"
                y2="수구기준 사국결정"
            } else if (x==11){

                y1="水    성수오행"
